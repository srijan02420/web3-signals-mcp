# =============================================================================
# Narrative Agent Profile — v2 (6-source rebuild)
# =============================================================================
# Scores narrative momentum from Reddit, Twitter, Farcaster, CryptoPanic,
# Google News, and CoinGecko Trending.
# Authority weighting, influencer tracking, LLM sentiment pipeline.
# Change any value here — agent logic adapts automatically.
# =============================================================================

name: narrative_default
http_timeout_sec: 20

# ---------------------------------------------------------------------------
# Assets to track
# ---------------------------------------------------------------------------
assets:
  - BTC
  - ETH
  - SOL
  - BNB
  - XRP
  - ADA
  - AVAX
  - DOT
  - MATIC
  - LINK
  - UNI
  - ATOM
  - LTC
  - FIL
  - NEAR
  - APT
  - ARB
  - OP
  - INJ
  - SUI

# ---------------------------------------------------------------------------
# Signal thresholds
# ---------------------------------------------------------------------------
thresholds:
  narrative_score_min: 0.40
  narrative_score_max: 0.70
  peak_window_days: 30

# ---------------------------------------------------------------------------
# Influencer file path (relative to engine.py or absolute)
# ---------------------------------------------------------------------------
influencer_file: ""   # empty = auto-detect data/influencers.yaml

# ---------------------------------------------------------------------------
# Source 1: Reddit (via PRAW) — with authority weighting
# ---------------------------------------------------------------------------
reddit:
  enabled: true
  user_agent: "web3-signal-bot:v1.0 (by /u/Impossible-Ad564)"

  subreddits:
    - CryptoCurrency
    - CryptoMarkets
    - Bitcoin
    - ethereum
    - solana
    - altcoin
    - defi
    - ethdev
    - CryptoTechnology
    - cosmosnetwork

  search_keywords:
    - cryptocurrency
    - crypto
    - defi
    - web3
    - bitcoin
    - ethereum
    - solana
    - altcoin
    - blockchain
    - token
    - staking
    - yield farming
    - airdrop
    - whale alert
    - bull run
    - bear market

  posts_per_search: 250
  time_filter: day
  sort: new
  min_score: 5
  weight_by_score: false   # replaced by authority weighting

  # Authority weighting — weights posts by author credibility
  authority:
    enabled: true
    min_account_age_days: 30        # ignore accounts younger than 30 days
    karma_tiers:
      - min_karma: 0
        weight: 1.0
      - min_karma: 1000
        weight: 1.5
      - min_karma: 10000
        weight: 2.0
      - min_karma: 50000
        weight: 3.0
      - min_karma: 100000
        weight: 4.0
    mod_bonus: 1.5                  # multiplier if author is a moderator
    verified_bonus: 1.2             # multiplier if email verified

# ---------------------------------------------------------------------------
# Source 2: Twitter/X (via twikit — free, no API key)
# ---------------------------------------------------------------------------
twitter:
  enabled: false    # twikit blocked by Cloudflare from server IPs — enable with Twitter API v2 or proxy
  provider: twikit
  # Credentials via env: TWITTER_USERNAME, TWITTER_EMAIL, TWITTER_PASSWORD
  cookie_path: "/tmp/twikit_cookies.json"
  tweets_per_query: 20

  search_queries:
    # High-signal accounts
    - "from:whale_alert OR from:lookonchain OR from:AltcoinGordon"
    - "from:CryptoCapo_ OR from:Pentosh1 OR from:GCRClassic"
    - "from:DegenSpartan OR from:inversebrah OR from:coaborage"
    # General crypto
    - "bitcoin bullish OR bearish"
    - "ethereum bullish OR bearish"
    - "solana bullish OR bearish"
    - "crypto whale OR accumulation"
    - "altcoin season OR altseason"
    - "defi yield OR airdrop"

# ---------------------------------------------------------------------------
# Source 3: Farcaster (via Neynar — 200K credits/month free)
# ---------------------------------------------------------------------------
farcaster:
  enabled: false    # Neynar free tier doesn't include cast search — enable when on paid plan
  base_url: "https://api.neynar.com/v2/farcaster/cast/search"
  # API key via env: NEYNAR_API_KEY
  results_per_query: 25

  search_queries:
    - bitcoin
    - ethereum
    - solana
    - defi
    - web3 crypto
    - onchain
    - airdrop
    - layer2

# ---------------------------------------------------------------------------
# Source 4: CryptoPanic (free API key, community-voted sentiment)
# ---------------------------------------------------------------------------
cryptopanic:
  enabled: false    # Cloudflare blocks API calls from servers — needs workaround
  base_url: "https://cryptopanic.com/api/v1/posts/"
  # API key via env: CRYPTOPANIC_API_KEY
  filter: hot                        # rising, hot, bullish, bearish, important

  # Map our asset symbols to CryptoPanic currency codes (if different)
  currency_map:
    MATIC: "MATIC"
    DOT: "DOT"
    # Most symbols match directly

# ---------------------------------------------------------------------------
# Source 5: Google News RSS (free, unlimited, no API key)
# ---------------------------------------------------------------------------
google_news:
  enabled: true
  base_url: "https://news.google.com/rss/search"
  max_items_per_asset: 20

  # Human-readable search names for better Google results
  asset_search_names:
    BTC: "Bitcoin"
    ETH: "Ethereum"
    SOL: "Solana"
    BNB: "BNB Binance"
    XRP: "XRP Ripple"
    ADA: "Cardano"
    AVAX: "Avalanche AVAX"
    DOT: "Polkadot"
    MATIC: "Polygon MATIC"
    LINK: "Chainlink"
    UNI: "Uniswap"
    ATOM: "Cosmos ATOM"
    LTC: "Litecoin"
    FIL: "Filecoin"
    NEAR: "NEAR Protocol"
    APT: "Aptos"
    ARB: "Arbitrum"
    OP: "Optimism crypto"
    INJ: "Injective"
    SUI: "Sui crypto"

# ---------------------------------------------------------------------------
# Source 6: CoinGecko Trending (free, no key)
# ---------------------------------------------------------------------------
coingecko_trending:
  enabled: true
  base_url: "https://api.coingecko.com/api/v3/search/trending"
  trending_boost: 20

# ---------------------------------------------------------------------------
# Asset keyword mapping — how we detect which asset a post is about
# ---------------------------------------------------------------------------
asset_keywords:
  BTC: [bitcoin, btc, satoshi, digital gold]
  ETH: [ethereum, eth, vitalik, dencun]
  SOL: [solana, sol, solana etf, solana network]
  BNB: [bnb, binance coin, bsc, binance smart chain]
  XRP: [xrp, ripple, garlinghouse]
  ADA: [cardano, ada, hoskinson]
  AVAX: [avalanche, avax]
  DOT: [polkadot, dot, parachain]
  MATIC: [polygon, matic, pol]
  LINK: [chainlink, link, oracle]
  UNI: [uniswap, uni]
  ATOM: [cosmos, atom, ibc]
  LTC: [litecoin, ltc, digital silver]
  FIL: [filecoin, fil, decentralized storage]
  NEAR: [near protocol, near]
  APT: [aptos, apt]
  ARB: [arbitrum, arb, layer 2]
  OP: [optimism, superchain]
  INJ: [injective, inj]
  SUI: [sui, sui network]

# ---------------------------------------------------------------------------
# Keyword-based sentiment (fast, every cycle)
# ---------------------------------------------------------------------------
sentiment:
  positive: [bull, surge, rally, breakout, ath, gain, pump, rise, growth, strong, buy, accumulate, moon, adoption, upgrade, partnership, launch]
  negative: [bear, crash, dump, drop, sell, fear, rekt, collapse, weak, correction, decline, panic, hack, exploit, rug, scam]

# ---------------------------------------------------------------------------
# LLM Sentiment Pipeline (12-hour batch cycle)
# ---------------------------------------------------------------------------
llm_sentiment:
  enabled: true
  model: "claude-haiku-4-5-20251001"
  max_tokens: 2048                   # reduced from 4096 — sufficient for event extraction
  max_age_hours: 48                  # increased from 24h — events remain valid longer
  system_prompt: >
    You are a crypto market event analyst. Analyze headlines for each
    cryptocurrency. Extract both overall sentiment AND specific material
    events (regulatory rulings, hacks, partnerships, listings, protocol
    upgrades, institutional adoption). One SEC ruling matters more than
    1000 generic price analysis articles. Focus on events that PRECEDE
    price moves, not articles that react to them.

  # Event types the LLM should classify headlines into
  event_types:
    - regulatory        # SEC filings, ETF approvals/rejections, bans, legal rulings
    - hack_exploit      # security breaches, rug pulls, exploits, fund recoveries
    - partnership       # integrations, collaborations, ecosystem deals
    - listing           # exchange listings, delistings, trading pair additions
    - upgrade           # protocol upgrades, hard forks, major releases
    - adoption          # institutional buys, corporate treasury, payment integrations
    - market_event      # whale moves, liquidation cascades, market structure shifts
    - general_sentiment # generic bullish/bearish commentary (lowest priority)

  # Pre-filter: score headlines by news-worthiness BEFORE sending to LLM.
  # Saves tokens, reduces noise, and ensures material events aren't drowned out.
  headline_filter:
    enabled: true
    max_per_asset: 5               # max headlines per asset sent to LLM (reduced from 10)
    min_relevance_score: -3.0      # drop headlines below this score

    # Headlines containing these keywords get boosted (+2 each)
    boost_keywords:
      # Regulatory
      - sec
      - etf
      - regulat
      - ruling
      - lawsuit
      - ban
      - approv
      - reject
      - compliance
      - legal
      - court
      - enforce
      # Hacks / exploits
      - hack
      - exploit
      - breach
      - rug
      - scam
      - theft
      - vulnerab
      - recover
      # Partnerships / adoption
      - partnership
      - integrat
      - adopt
      - treasury
      - institutional
      - blackrock
      - fidelity
      - grayscale
      - jpmorgan
      - goldman
      # Listings
      - listing
      - delist
      - launch
      - exchange
      # Upgrades
      - upgrade
      - fork
      - mainnet
      - testnet
      - release
      - deploy
      # Market structure
      - liquidat
      - whale
      - billion
      - million
      - record
      - all-time
      - inflow
      - outflow

    # Headlines matching these patterns get penalized (-5 each)
    noise_patterns:
      - should i
      - what do you think
      - is it too late
      - price prediction
      - price analysis
      - will it
      - can it reach
      - when will
      - daily discussion
      - daily thread
      - unpopular opinion
      - change my mind
      - eli5
      - beginner
      - newbie
      - help me
      - advice needed
      - thoughts on
      - opinions on

    # Structural penalties
    question_penalty: -3.0         # headlines ending with "?" are usually discussion
    short_headline_penalty: -2.0   # headlines < 20 chars are usually low quality
    short_headline_threshold: 20
    number_bonus: 1.0              # headlines with numbers = specific data = better
